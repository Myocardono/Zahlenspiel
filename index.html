<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahlenratespiel</title>

    <!-- Google Fonts für die Schriftart -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <!-- CSS für das Design -->
  <style>
    body {
        font-family: 'Roboto', sans-serif; /* Schriftart */
        margin: 0;
        padding: 0;
        background-color: #F5F5DC; /* Helles Beige-Braun für den Hintergrund */
        color: #3E2A47; /* Dunkelbrauner Text */
    }

    h1 {
        text-align: center;
        color: #8B4513; /* Sattelbraun für den Titel */
        font-size: 36px;
        margin-top: 30px;
    }

    #game-container {
        background-color: #ffffff;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.1);
        width: 300px;
        margin: 30px auto;
        text-align: center;
    }

    input, button {
        padding: 12px;
        width: 80%;
        font-size: 18px;
        margin: 10px auto;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        background-color: #8B4513; /* Sattelbraun für den Button */
        color: white;
        cursor: pointer;
        transition: all 0.3s ease; /* Sanfter Übergang bei Hover */
    }

    button:hover {
        background-color: #A0522D; /* Dunkles Orangebraun bei Hover */
        transform: translateY(-3px); /* Leichtes Heben des Buttons */
    }

    #message {
        font-size: 18px;
        color: #8B4513; /* Sattelbraune Nachricht */
        font-weight: bold;
    }

    /* Neuer Style für den Highscore zurücksetzen Button */
    .reset-button {
        background-color: #D2691E; /* Schokoladenbraun für den Reset-Button */
    }

    .reset-button:hover {
        background-color: #CD5C5C; /* Dunkleres Rotbraun bei Hover */
    }

    /* Wackel-Animation für den Highscore-Button */
    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
        100% { transform: translateX(0); }
    }

    .reset-button:active {
        animation: shake 0.3s ease; /* Wackeln, wenn gedrückt */
    }
</style>
  
    
</head>

<body>
    <h1>Zahlenratespiel</h1>

    <div id="game-container">
        <p>Rate die Zahl zwischen 1 und 100:</p>
        <input type="number" id="guess" min="1" max="100">
        <button onclick="checkGuess()">Raten</button>
        <button onclick="startNewGame()">Neues Spiel</button> <!-- Der "Neues Spiel"-Button -->
        <button onclick="resetHighscore()" class="reset-button">Highscore zurücksetzen</button> <!-- Der Button für den Highscore -->
        <p id="message"></p>
    </div>

    <!-- Dein JavaScript-Code hier -->
    <script src="script.js"></script>
</body>
</html>
