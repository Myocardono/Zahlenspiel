<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahlenraten Spiel</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f1f1;
            color: #333;
        }

        h1 {
            text-align: center;
            font-size: 36px;
            color: #4CAF50;
            margin-top: 20px;
        }

        #game-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin: 30px auto;
            padding: 20px;
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        #timer {
            font-size: 20px;
            color: #ff5722;
            font-weight: bold;
            margin-top: 10px;
        }

        #message {
            font-size: 18px;
            color: #ff5722;
            margin-top: 20px;
        }

        #highscore {
            font-size: 20px;
            color: #333;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Zahlenraten</h1>

<div id="game-container">
    <input type="number" id="guess" placeholder="Gib deine Zahl ein..." />
    <button id="submit">Raten</button>
    <div id="timer">Zeit: 30s</div>
    <div id="message"></div>
    <div id="highscore">Bester Versuch: -</div>
    <button id="new-game">Neues Spiel</button>
</div>

<script src="script.js"></script>

</body>
</html>
